name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    name: Test + Build (ad-hoc signed)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        # Prefer the latest stable Xcode available on the runner.
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        run: |
          xcodebuild \
            -project Beckon.xcodeproj \
            -scheme Beckon \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath build/DerivedData \
            test

      - name: Generate coverage report
        id: coverage
        run: |
          XCRESULT=$(find build/DerivedData/Logs/Test -maxdepth 1 -type d -name '*.xcresult' | sort | tail -n 1)
          if [[ -z "$XCRESULT" ]]; then
            echo "No xcresult found under build/DerivedData/Logs/Test"
            exit 1
          fi

          xcrun xccov view --report "$XCRESULT" > coverage-report.txt
          APP_LINE=$(grep -m1 'Beckon.app' coverage-report.txt | tr -s ' ' | sed 's/^ //' || true)
          if [[ -z "$APP_LINE" ]]; then
            APP_LINE="Beckon.app coverage line unavailable"
          fi

          echo "xcresult=$XCRESULT" >> "$GITHUB_OUTPUT"
          echo "app_line=$APP_LINE" >> "$GITHUB_OUTPUT"

          {
            echo "### Code Coverage"
            echo ""
            echo "- App: \`$APP_LINE\`"
            echo ""
            echo "<details><summary>Coverage excerpt</summary>"
            echo ""
            echo '```text'
            head -n 80 coverage-report.txt
            echo '```'
            echo "</details>"
          } > coverage-summary.md

          cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Beckon-coverage-report
          path: |
            coverage-report.txt
            coverage-summary.md
            ${{ steps.coverage.outputs.xcresult }}
          retention-days: 14

      - name: Build
        run: |
          xcodebuild \
            -project Beckon.xcodeproj \
            -scheme Beckon \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=build/products \
            build

      - name: Locate built app
        # xcodebuild places the product at build/products/Release/Beckon.app
        run: ls -la build/products/Release/

      - name: Ad-hoc sign app bundle
        run: |
          APP_PATH="build/products/Release/Beckon.app"
          codesign --force --deep --sign - --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package app bundle
        run: |
          mkdir -p dist
          cp -R build/products/Release/Beckon.app dist/
          hdiutil create \
            -volname "Beckon Build" \
            -srcfolder dist \
            -ov \
            -format UDZO \
            Beckon-adhoc-signed.dmg

      - name: Upload artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: Beckon-adhoc-signed
          path: Beckon-adhoc-signed.dmg
          retention-days: 14

      - name: Comment on PR with artifact link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const artifactUrl = '${{ steps.upload-artifact.outputs.artifact-url }}';
            const coverageSummary = fs.existsSync('coverage-summary.md')
              ? fs.readFileSync('coverage-summary.md', 'utf8')
              : '### Code Coverage\n\nCoverage summary unavailable.';
            const body = [
              'Ad-hoc signed build artifact is ready.',
              '',
              `Download: ${artifactUrl}`,
              '',
              coverageSummary,
              '',
              'If macOS blocks launch after download, remove quarantine and open:',
              'xattr -dr com.apple.quarantine Beckon.app',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });