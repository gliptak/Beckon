name: Manual Release

on:
  workflow_dispatch:
    inputs:
      mark_latest:
        description: "Mark this release as latest"
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Build + Publish Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail

          git fetch --tags --force

          base_version="$(date -u +'%Y.%m')"
          version="$base_version"
          minor=0

          while git rev-parse -q --verify "refs/tags/v$version" >/dev/null || \
            git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; do
            minor=$((minor + 1))
            version="$base_version.$minor"
          done

          prev_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$prev_tag" >> "$GITHUB_OUTPUT"

          echo "Resolved version: $version"
          if [[ -n "$prev_tag" ]]; then
            echo "Previous tag: $prev_tag"
          else
            echo "Previous tag: none (first release)"
          fi

      - name: Build universal Release app
        run: |
          set -euo pipefail

          xcodebuild \
            -project Beckon.xcodeproj \
            -scheme Beckon \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=build/products \
            build

      - name: Ad-hoc sign app bundle
        run: |
          set -euo pipefail

          APP_PATH="build/products/Release/Beckon.app"
          codesign --force --deep --sign - --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo "Built app binary architectures:"
          lipo -info "$APP_PATH/Contents/MacOS/Beckon"

      - name: Package release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          APP_PATH="build/products/Release/Beckon.app"
          STAGE_DIR="dist/Beckon-v$VERSION"
          DMG_PATH="dist/Beckon-v$VERSION.dmg"

          rm -rf dist
          mkdir -p "$STAGE_DIR"
          cp -R "$APP_PATH" "$STAGE_DIR/"

          hdiutil create \
            -volname "Beckon v$VERSION" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          ls -lah dist

      - name: Generate Homebrew cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          DMG_PATH="dist/Beckon-v$VERSION.dmg"
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          sed \
            -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{SHA256}}/$SHA256/g" \
            Casks/beckon.rb.template > Casks/beckon.rb

          echo "Generated Casks/beckon.rb:"
          cat Casks/beckon.rb

      - name: Generate release notes from merged PRs
        uses: actions/github-script@v8
        env:
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prevTag = process.env.PREV_TAG;
            const version = process.env.VERSION;

            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;
            const prMap = new Map();

            if (prevTag) {
              const compare = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${prevTag}...${context.sha}`,
                per_page: 250,
              });

              for (const commit of compare.data.commits) {
                const prsForCommit = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: commit.sha,
                });

                for (const pr of prsForCommit.data) {
                  if (pr.merged_at) {
                    prMap.set(pr.number, pr);
                  }
                }
              }
            } else {
              // First release: gather merged PRs against the default branch.
              // Cap the scan to avoid excessive API calls on large repositories.
              const maxMergedPRs = 300;
              for await (const page of github.paginate.iterator(github.rest.pulls.list, {
                owner,
                repo,
                state: 'closed',
                base: defaultBranch,
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
              })) {
                for (const pr of page.data) {
                  if (pr.merged_at) {
                    prMap.set(pr.number, pr);
                    if (prMap.size >= maxMergedPRs) {
                      break;
                    }
                  }
                }

                if (prMap.size >= maxMergedPRs) {
                  break;
                }
              }
            }

            const prs = [...prMap.values()].sort((a, b) => a.number - b.number);
            const authors = [...new Set(prs.map((pr) => `@${pr.user.login}`))].sort();

            const lines = [];
            lines.push(`# Beckon v${version}`);
            lines.push('');
            lines.push('Ad-hoc signed release artifact.');
            lines.push('');

            if (prevTag) {
              lines.push(`Changes since ${prevTag}:`);
            } else {
              lines.push('Initial release notes:');
            }
            lines.push('');

            if (prs.length === 0) {
              lines.push('- No merged PRs detected in this release range.');
            } else {
              for (const pr of prs) {
                lines.push(`- #${pr.number} ${pr.title} (${pr.user.login})`);
              }
            }

            lines.push('');
            lines.push('Contributors:');
            if (authors.length === 0) {
              lines.push('- none');
            } else {
              for (const author of authors) {
                lines.push(`- ${author}`);
              }
            }

            fs.writeFileSync('RELEASE_NOTES.md', lines.join('\n'));

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Beckon v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/Beckon-v${{ steps.version.outputs.version }}.dmg
            Casks/beckon.rb
          fail_on_unmatched_files: false
          make_latest: ${{ inputs.mark_latest && 'true' || 'false' }}

      - name: Commit Homebrew cask to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add Casks/beckon.rb
          git commit -m "chore: update Homebrew cask to v$VERSION [skip ci]"
          git push origin main